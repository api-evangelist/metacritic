aid: metacritic
name: Metacritic
description: >-
  Metacritic is a review aggregator that collects critic and user scores for games, movies, TV shows,
  and music, computing a weighted Metascore for each title. The Metacritic API (provided via Fabric Origin /
  IVA / Gracenote) gives programmatic access to Metascores, user scores, individual critic reviews,
  publication details, and entertainment rankings for movies and television. Unofficial community-built
  wrappers also expose game, movie, and TV data from Metacritic's public backend.
type: Index
