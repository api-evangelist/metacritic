apis:
  - aid: metacritic:metacritic-api
    name: Metacritic API (Fabric Origin)
    description: >-
      The official Metacritic API, delivered through Fabric Origin (formerly IVA / Gracenote), provides
      structured access to Metascores, user scores, and individual critic reviews for movies and TV shows.
      Requests are authenticated with a subscription key passed via the Ocp-Apim-Subscription-Key header
      or as a query parameter. Access requires a paid Fabric Origin subscription — data is not available
      on free trial plans and each developer account must be approved before use.
    humanURL: https://developer.origin.fabricdata.com/origin/apis-all/metacritic-api-docs/metacritic
